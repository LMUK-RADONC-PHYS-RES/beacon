      title: "Set Axial View"
      python_name: "napari_view_switch:set_axial"
      
    - id: "napari-view-switch.set_coronal_view"
      title: "Set Coronal View"
      python_name: "napari_view_switch:set_coronal"

    - id: "napari-view-switch.set_saggital_view"
      title: "Set Saggital View"
      python_name: "napari_view_switch:set_saggital"

  widgets:
    - command: "napari-view-switch.ViewSwitchWidget"
      display_name: View Switch