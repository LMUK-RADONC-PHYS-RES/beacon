visibility: hidden
# see https://napari.org/stable/plugins/technical_references/manifest.html#fields for valid categories
categories: ["Utilities"]
contributions:
  commands:
    - id: "napari-view-switch.ViewSwitchWidget"
      title: "View Switch"
      python_name: "napari_view_switch:ViewSwitchWidget"
      
